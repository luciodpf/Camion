<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f1a">
<title>Camión — Visor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#22223a;--border:#2e2e4a;--accent:#e8c547;--accent2:#4fc3f7;--text:#e8e8f0;--muted:#7070a0;--danger:#ff6b6b;--success:#69db7c;--gold:#f4a44a;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;padding-bottom:30px}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:12px}
.header-title{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--accent)}
.header-sub{font-size:11px;color:var(--muted);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.visor-badge{background:rgba(244,164,74,.12);border:1px solid rgba(244,164,74,.3);color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.06em}
.km-badge{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px;text-align:right}
.km-label{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace}
.km-value{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--accent2)}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border)}
.month-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.month-label{font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:600;text-transform:uppercase;letter-spacing:.08em}

/* SUMMARY */
.summary-strip{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px 16px}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center}
.summary-card.highlight{border-color:rgba(244,164,74,.4);background:rgba(244,164,74,.06)}
.s-val{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:600;color:var(--accent)}
.s-val.cost{color:var(--gold)}
.s-label{font-size:10px;color:var(--muted);margin-top:2px}
.summary-strip-3{grid-template-columns:repeat(3,1fr)}

/* TARIFAS PANEL */
.tarifas-toggle{margin:0 16px 8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.tarifas-toggle-label{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.tarifas-toggle-icon{color:var(--muted);font-size:14px;transition:transform .2s}
.tarifas-toggle-icon.open{transform:rotate(180deg)}
.tarifas-panel{margin:0 16px 12px;background:var(--surface);border:1px solid rgba(244,164,74,.3);border-radius:var(--r);overflow:hidden;display:none}
.tarifas-panel.open{display:block}
.tarifas-header{padding:10px 14px;background:rgba(244,164,74,.08);border-bottom:1px solid rgba(244,164,74,.2);font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);text-transform:uppercase;letter-spacing:.08em}
.tarifa-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:10px}
.tarifa-row:last-child{border-bottom:none}
.tarifa-ruta{flex:1;font-size:13px;color:var(--text)}
.tarifa-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--gold);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:6px 10px;width:110px;text-align:right;outline:none}
.tarifa-input:focus{border-color:var(--gold)}
.tarifa-unit{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;white-space:nowrap}

/* RECORDS */
.records{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.day-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;padding:12px 4px 4px}
.record-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;display:flex;align-items:flex-start;gap:12px}
.rec-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tv .rec-icon{background:rgba(232,197,71,.12)}
.tc .rec-icon{background:rgba(79,195,247,.12)}
.tr .rec-icon{background:rgba(255,107,107,.12)}
.tm .rec-icon{background:rgba(105,219,124,.12)}
.rec-info{flex:1;min-width:0}
.rec-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-detail{font-size:12px;color:var(--muted);margin-top:3px}
.rec-meta{text-align:right;flex-shrink:0}
.rec-km{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--accent2)}
.rec-cost{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:600;color:var(--gold);margin-top:4px}
.rec-cost-none{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--border);margin-top:4px}
.badge{display:inline-block;font-size:10px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;padding:2px 6px;border-radius:4px;margin-top:4px}
.bv{background:rgba(232,197,71,.15);color:var(--accent)}
.bc{background:rgba(79,195,247,.15);color:var(--accent2)}
.br{background:rgba(255,107,107,.15);color:var(--danger)}
.bm{background:rgba(105,219,124,.15);color:var(--success)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}
.e-icon{font-size:48px;display:block;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.refresh-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'IBM Plex Mono',monospace}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div>
      <div class="header-title">🚛 CAMIÓN</div>
      <div class="header-sub">Panel de seguimiento</div>
    </div>
    <div class="visor-badge">Visor</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <button class="refresh-btn" onclick="loadData()">↻</button>
    <div class="km-badge">
      <div class="km-label">Último KM</div>
      <div class="km-value" id="lastKmDisplay">—</div>
    </div>
  </div>
</div>

<div class="month-nav">
  <button class="month-btn" onclick="changeMonth(-1)">‹</button>
  <div class="month-label" id="monthLabel">—</div>
  <button class="month-btn" onclick="changeMonth(1)">›</button>
</div>

<div class="summary-strip summary-strip-3" id="summaryStrip">
  <div class="summary-card"><div class="s-val" id="sumViajes">—</div><div class="s-label">Viajes</div></div>
  <div class="summary-card"><div class="s-val" id="sumKilos">—</div><div class="s-label">Tn totales</div></div>
  <div class="summary-card"><div class="s-val" id="sumLitros">—</div><div class="s-label">Litros</div></div>
</div>
<div class="summary-strip" style="padding-top:0">
  <div class="summary-card highlight" style="grid-column:1/-1">
    <div class="s-val cost" id="sumCosto">—</div>
    <div class="s-label">Costo estimado del mes</div>
  </div>
</div>

<!-- TARIFAS -->
<div class="tarifas-toggle" onclick="toggleTarifas()">
  <span class="tarifas-toggle-label">⚙ Tarifas por ruta</span>
  <span class="tarifas-toggle-icon" id="tarifasIcon">▼</span>
</div>
<div class="tarifas-panel" id="tarifasPanel">
  <div class="tarifas-header">Tarifa ($/tn) · Costo = tarifa × kilos × 0.18 / 1000</div>
  <div id="tarifasList"></div>
</div>

<div class="records" id="recordsContainer">
  <div class="loading"><div class="spinner"></div>Cargando...</div>
</div>

<script>
const SHEET_ID = '1wkAAUVgFGOH8q0xni1nfyuFB_fXN5kfV6XkbORZ1YUQ';
const SHEET_NAME = 'Novedades';
const MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
let currentMonth = new Date().getMonth(), currentYear = new Date().getFullYear();
let allRecords = [], lastKm = null;
// tarifas: { "AFA|Renova": 24.762, ... } — solo en memoria, no se guarda
let tarifas = {};

document.addEventListener('DOMContentLoaded', () => { updateMonthLabel(); loadData(); });

async function loadData() {
  document.getElementById('recordsContainer').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const r = await fetch(url);
    const csv = await r.text();
    allRecords = parseCSV(csv);
    updateLastKm(); buildTarifasList(); renderRecords();
  } catch(e) {
    document.getElementById('recordsContainer').innerHTML = '<div class="empty-state"><span class="e-icon">⚠️</span><span>Error cargando datos</span></div>';
  }
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return [];
  return lines.slice(1).map(l => {
    const c = parseCSVLine(l);
    const fecha = c[0]?.replace(/"/g,'').trim();
    if (!fecha) return null;
    return { fecha, km_camion:c[1]?.replace(/"/g,'').trim()||'', tipo:c[2]?.replace(/"/g,'').trim()||'',
      origen:c[3]?.replace(/"/g,'').trim()||'', destino:c[4]?.replace(/"/g,'').trim()||'',
      kms_rec:c[5]?.replace(/"/g,'').trim()||'', especie:c[6]?.replace(/"/g,'').trim()||'',
      kilos:c[7]?.replace(/"/g,'').trim()||'', litros:c[8]?.replace(/"/g,'').trim()||'',
      actividad:c[9]?.replace(/"/g,'').trim()||'', proveedor:c[10]?.replace(/"/g,'').trim()||'' };
  }).filter(Boolean);
}

function parseCSVLine(line) {
  const r=[]; let cur='', inQ=false;
  for (let i=0;i<line.length;i++) {
    const ch=line[i];
    if(ch==='"'){inQ=!inQ;} else if(ch===','&&!inQ){r.push(cur);cur='';} else{cur+=ch;}
  }
  r.push(cur); return r;
}

function parseDate(s) {
  if(!s) return null;
  const p=s.split('/');
  if(p.length===3) return new Date(+p[2],+p[1]-1,+p[0]);
  const d=new Date(s); return isNaN(d)?null:d;
}

function updateLastKm() {
  const w=allRecords.filter(r=>r.km_camion&&!isNaN(+r.km_camion));
  if(!w.length) return;
  w.sort((a,b)=>(parseDate(b.fecha)||0)-(parseDate(a.fecha)||0));
  lastKm=+w[0].km_camion;
  document.getElementById('lastKmDisplay').textContent=lastKm.toLocaleString('es-AR');
}

function rutaKey(o, d) { return `${o}|${d}`; }

function buildTarifasList() {
  // Collect unique routes from ALL records
  const rutas = new Map();
  for (const r of allRecords) {
    if (r.tipo === 'Viaje' && r.origen && r.destino) {
      const k = rutaKey(r.origen, r.destino);
      if (!rutas.has(k)) rutas.set(k, { origen: r.origen, destino: r.destino });
    }
  }
  const lista = document.getElementById('tarifasList');
  if (rutas.size === 0) { lista.innerHTML = '<div style="padding:12px 14px;font-size:13px;color:var(--muted)">Sin rutas registradas aún</div>'; return; }
  lista.innerHTML = [...rutas.entries()].map(([k, {origen, destino}]) => `
    <div class="tarifa-row">
      <div class="tarifa-ruta">${origen} → ${destino}</div>
      <input class="tarifa-input" type="number" placeholder="0.00"
        value="${tarifas[k]||''}"
        onchange="setTarifa('${k}', this.value)"
        oninput="setTarifa('${k}', this.value)">
      <span class="tarifa-unit">$/tn</span>
    </div>`).join('');
}

function setTarifa(key, val) {
  const v = parseFloat(val);
  if (!isNaN(v) && v > 0) { tarifas[key] = v; } else { delete tarifas[key]; }
  renderRecords();
}

function calcCosto(r) {
  if (r.tipo !== 'Viaje' || !r.kilos || !r.origen || !r.destino) return null;
  const tarifa = tarifas[rutaKey(r.origen, r.destino)];
  if (!tarifa) return null;
  return tarifa * +r.kilos * 0.18 / 1000;
}

function toggleTarifas() {
  const panel = document.getElementById('tarifasPanel');
  const icon = document.getElementById('tarifasIcon');
  panel.classList.toggle('open');
  icon.classList.toggle('open');
}

function updateMonthLabel() { document.getElementById('monthLabel').textContent=`${MONTHS[currentMonth]} ${currentYear}`; }

function getMonthRecords() {
  return allRecords.filter(r=>{const d=parseDate(r.fecha);return d&&d.getMonth()===currentMonth&&d.getFullYear()===currentYear;})
    .sort((a,b)=>(parseDate(b.fecha)||0)-(parseDate(a.fecha)||0));
}

function renderRecords() {
  const records = getMonthRecords();
  const viajes = records.filter(r=>r.tipo==='Viaje');
  const kilosTot = viajes.reduce((s,r)=>s+(+r.kilos||0),0);
  const litrosTot = records.filter(r=>r.tipo==='Combustible').reduce((s,r)=>s+(+r.litros||0),0);
  let costoTot = 0; let hasCosto = false;
  for (const r of viajes) { const c=calcCosto(r); if(c!=null){costoTot+=c;hasCosto=true;} }

  document.getElementById('sumViajes').textContent = viajes.length||'—';
  document.getElementById('sumKilos').textContent = kilosTot>0?(kilosTot>=1000?(kilosTot/1000).toFixed(1)+'t':kilosTot):'—';
  document.getElementById('sumLitros').textContent = litrosTot||'—';
  document.getElementById('sumCosto').textContent = hasCosto ? '$'+costoTot.toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0}) : '— (cargá tarifas)';

  const cont = document.getElementById('recordsContainer');
  if (!records.length) { cont.innerHTML=`<div class="empty-state"><span class="e-icon">📋</span><span>Sin novedades en ${MONTHS[currentMonth]}</span></div>`; return; }

  const byDay = {};
  for (const r of records) { if(!byDay[r.fecha])byDay[r.fecha]={date:parseDate(r.fecha),items:[]}; byDay[r.fecha].items.push(r); }
  const days = Object.keys(byDay).sort((a,b)=>(byDay[b].date||0)-(byDay[a].date||0));
  cont.innerHTML = days.map(k => {
    const {date,items} = byDay[k];
    const label = date?date.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}):k;
    return `<div class="day-label">${label}</div>` + items.map(renderCard).join('');
  }).join('');
}

function renderCard(r) {
  const map={Viaje:{icon:'🌾',cls:'tv',bc:'bv'},Combustible:{icon:'⛽',cls:'tc',bc:'bc'},Reparacion:{icon:'🔧',cls:'tr',bc:'br'},Mantenimiento:{icon:'🔩',cls:'tm',bc:'bm'}};
  const td = map[r.tipo]||{icon:'📋',cls:'',bc:''};
  let title=r.tipo, detail='';
  if(r.tipo==='Viaje'){title=`${r.origen} → ${r.destino}`;detail=[r.especie,+r.kilos?`${(+r.kilos/1000).toFixed(1)} tn`:'',r.kms_rec?`${r.kms_rec} km`:''].filter(Boolean).join(' · ');}
  else if(r.tipo==='Combustible'){title='Carga combustible';detail=[r.litros?`${r.litros} L`:'',r.proveedor].filter(Boolean).join(' · ');}
  else if(r.tipo==='Reparacion'){title=r.actividad||'Reparación';detail=r.proveedor||'';}
  else if(r.tipo==='Mantenimiento'){title=r.actividad||'Mantenimiento';}

  let costoHtml = '';
  if (r.tipo === 'Viaje') {
    const c = calcCosto(r);
    costoHtml = c != null
      ? `<div class="rec-cost">$${c.toLocaleString('es-AR',{minimumFractionDigits:0,maximumFractionDigits:0})}</div>`
      : `<div class="rec-cost-none">sin tarifa</div>`;
  }

  return `<div class="record-card ${td.cls}">
    <div class="rec-icon">${td.icon}</div>
    <div class="rec-info">
      <div class="rec-title">${title}</div>
      ${detail?`<div class="rec-detail">${detail}</div>`:''}
      <span class="badge ${td.bc}">${r.tipo}</span>
    </div>
    <div class="rec-meta">
      ${r.km_camion?`<div class="rec-km">${(+r.km_camion).toLocaleString('es-AR')} km</div>`:''}
      ${costoHtml}
    </div>
  </div>`;
}

function changeMonth(d){currentMonth+=d;if(currentMonth>11){currentMonth=0;currentYear++;}if(currentMonth<0){currentMonth=11;currentYear--;}updateMonthLabel();renderRecords();}
</script>
</body>
</html>
